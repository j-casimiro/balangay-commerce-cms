services:
  postgres:
    image: postgres:16-alpine
    container_name: cms_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cms_password}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_cms}
    volumes:
      - cms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-ecommerce_cms}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cms_pgdata:
