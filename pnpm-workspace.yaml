packages:
  - "apps/*"
  - "packages/*"

# Approve install/build scripts for trusted native dependencies (Prisma query
# engines, esbuild, sharp, the unrs native module resolver). pnpm blocks
# lifecycle scripts by default for safety. @scarf/scarf is analytics-only and
# needs no native build, so its script stays disabled.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - esbuild
  - prisma
  - sharp
  - unrs-resolver
