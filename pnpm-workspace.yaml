packages:
  - "apps/*"
  - "packages/*"

# Approve install/build scripts for trusted native dependencies (Prisma query
# engines, esbuild, sharp). pnpm blocks lifecycle scripts by default for safety.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - esbuild
  - prisma
  - sharp
